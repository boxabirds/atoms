// ===========================================================================
// DRAG HANDLERS
// ===========================================================================

function startPaletteDrag(type, e) {
  isDraggingFromPalette = true; dragAtomType = type;
  const ghost = document.getElementById('drag-ghost');
  const hex = '#' + ATOM_DEFS[type].color.toString(16).padStart(6, '0');
  ghost.style.background = hex; ghost.style.color = hex;
  ghost.className = type === 'flex' ? 'capsule' : '';
  ghost.id = 'drag-ghost'; ghost.style.display = 'block';
  ghost.style.left = e.clientX + 'px'; ghost.style.top = e.clientY + 'px';

  clearGhost();
  ghostMesh = createAtomGroup(type, true); ghostMesh.visible = false; scene.add(ghostMesh);

  const onMove = (ev) => {
    ghost.style.left = ev.clientX + 'px'; ghost.style.top = ev.clientY + 'px';
    updateGhostFromRay(ev);
  };
  const onUp = () => {
    ghost.style.display = 'none';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    if (ghostMesh && ghostMesh.visible) addAtom(dragAtomType, ghostMesh.position.clone());
    clearGhost(); isDraggingFromPalette = false; dragAtomType = null;
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startMachineDrag(mi, e) {
  isDraggingMachine = true;
  const ghost = document.getElementById('drag-ghost');
  ghost.style.background = '#4fc3f7'; ghost.style.color = '#4fc3f7';
  ghost.className = ''; ghost.id = 'drag-ghost'; ghost.style.display = 'block';
  ghost.style.left = e.clientX + 'px'; ghost.style.top = e.clientY + 'px';

  clearGhost();
  const machine = PREBUILT_MACHINES[mi];
  ghostMesh = new THREE.Group();
  for (const a of machine.atoms) {
    const g = createAtomGroup(a.type, true);
    g.position.set(a.offset[0], a.offset[1], a.offset[2]);
    ghostMesh.add(g);
  }
  ghostMesh.visible = false; scene.add(ghostMesh);

  const onMove = (ev) => {
    ghost.style.left = ev.clientX + 'px'; ghost.style.top = ev.clientY + 'px';
    const rect = renderer.domElement.getBoundingClientRect();
    mouseNDC.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    mouseNDC.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseNDC, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const pt = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(plane, pt)) {
      pt.y = Math.max(pt.y, GROUND_Y + ATOM_RADIUS);
      ghostMesh.position.copy(pt); ghostMesh.visible = true;
    }
  };
  const onUp = () => {
    ghost.style.display = 'none';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    if (ghostMesh && ghostMesh.visible) spawnMachine(mi, ghostMesh.position.clone());
    clearGhost(); isDraggingMachine = false;
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function spawnMachine(mi, center) {
  const machine = PREBUILT_MACHINES[mi];
  const spawned = [];
  for (const def of machine.atoms) {
    const pos = center.clone().add(new THREE.Vector3(def.offset[0], def.offset[1], def.offset[2]));
    pos.y = Math.max(pos.y, GROUND_Y + ATOM_RADIUS);
    const atom = addAtom(def.type, pos);
    // Apply phase offset for alternating PULSE timing
    if (def.phaseOffset !== undefined && atom.type === 'pulse') {
      atom.group.userData.pulsePhase = def.phaseOffset;
      // Stagger the initial fire time so they don't all fire at once
      atom.group.userData.lastFireTime = -(PULSE_FIRE_INTERVAL * (def.phaseOffset / (Math.PI * 2)));
    }
    spawned.push(atom);
  }
  for (const [fi, ti] of machine.autoConnect) {
    const fa = spawned[fi], ta = spawned[ti];
    if (!fa || !ta) continue;
    const fN = getNodePositions(fa), tN = getNodePositions(ta);
    let bD = Infinity, bF = -1, bT = -1;
    for (let i = 0; i < fN.length; i++) {
      if (isNodeOccupied(fa.id, i)) continue;
      for (let j = 0; j < tN.length; j++) {
        if (isNodeOccupied(ta.id, j)) continue;
        const d = fN[i].distanceTo(tN[j]);
        if (d < bD) { bD = d; bF = i; bT = j; }
      }
    }
    if (bF >= 0) formConnection(fa.id, ta.id, bF, bT);
  }
  showToast('Spawned: ' + machine.name);
}

function updateGhostFromRay(ev) {
  if (!ghostMesh) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouseNDC.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  mouseNDC.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouseNDC, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const pt = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(plane, pt)) {
    ghostMesh.position.copy(pt);
    ghostMesh.position.y = Math.max(ghostMesh.position.y, GROUND_Y + ATOM_RADIUS);
    ghostMesh.visible = true;
    snapGhostToNearby(ghostMesh);
  }
}

function snapGhostToNearby(ghost) {
  let bD = SNAP_DISTANCE * 1.5, bP = null;
  for (const atom of atoms) {
    const d = ghost.position.distanceTo(atom.group.position);
    if (d < bD) {
      const dir = ghost.position.clone().sub(atom.group.position).normalize();
      if (dir.lengthSq() < 0.001) dir.set(1, 0, 0);
      const sd = (atom.type === 'flex' || dragAtomType === 'flex')
        ? FLEX_LENGTH * 0.5 + ATOM_RADIUS : ATOM_RADIUS * REST_LENGTH_FACTOR;
      bP = atom.group.position.clone().add(dir.multiplyScalar(sd));
      bD = d;
    }
  }
  if (bP) ghost.position.lerp(bP, 0.3);
}

function clearGhost() { if (ghostMesh) { scene.remove(ghostMesh); ghostMesh = null; } }

// ===========================================================================
// TOOL STATE
// ===========================================================================

function selectAtomType(type) { currentTool = null; selectedAtomType = type; updatePaletteUI(); }
function toggleSelectTool() {
  if (currentTool === 'select') currentTool = null;
  else { currentTool = 'select'; selectedAtomType = null; clearGhost(); }
  updatePaletteUI();
}
function updatePaletteUI() {
  document.querySelectorAll('.atom-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.atomType === selectedAtomType && currentTool !== 'select'));
  const sb = document.getElementById('select-tool-btn');
  if (sb) sb.classList.toggle('active', currentTool === 'select');
}
function updateFreezeUI() {
  document.getElementById('freeze-btn').classList.toggle('frozen', isFrozen);
  document.getElementById('freeze-label').textContent = isFrozen ? 'Frozen' : 'Live';
}

// ===========================================================================
// INPUT
// ===========================================================================

function setupEvents() {
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('mousedown', onMouseDown);
  renderer.domElement.addEventListener('mouseup', onMouseUp);
  renderer.domElement.addEventListener('contextmenu', onRightClick);
  renderer.domElement.addEventListener('dblclick', onDoubleClick);
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('resize', onResize);

  // Mobile touch → mouse event adapter
  function touchToMouse(type, touch) {
    return new MouseEvent(type, {
      clientX: touch.clientX, clientY: touch.clientY,
      button: 0, buttons: 1, bubbles: true,
    });
  }
  renderer.domElement.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    renderer.domElement.dispatchEvent(touchToMouse('mousemove', t));
    renderer.domElement.dispatchEvent(touchToMouse('mousedown', t));
  }, { passive: false });
  renderer.domElement.addEventListener('touchmove', (e) => {
    e.preventDefault();
    renderer.domElement.dispatchEvent(touchToMouse('mousemove', e.touches[0]));
  }, { passive: false });
  renderer.domElement.addEventListener('touchend', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    renderer.domElement.dispatchEvent(touchToMouse('mouseup', t));
  }, { passive: false });

  // Touch support for palette atom buttons
  document.querySelectorAll('.atom-btn').forEach(btn => {
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      btn.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY, button: 0, bubbles: true }));
    }, { passive: false });
  });

  // Touch support for machine cards
  document.querySelectorAll('.machine-card').forEach(card => {
    card.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      card.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY, button: 0, bubbles: true }));
    }, { passive: false });
  });

  // Global touch move/end for drags in progress
  document.addEventListener('touchmove', (e) => {
    if (isDraggingFromPalette || isDraggingMachine) {
      e.preventDefault();
      document.dispatchEvent(new MouseEvent('mousemove', { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY, bubbles: true }));
    }
  }, { passive: false });
  document.addEventListener('touchend', (e) => {
    if (isDraggingFromPalette || isDraggingMachine) {
      e.preventDefault();
      const t = e.changedTouches[0];
      document.dispatchEvent(new MouseEvent('mouseup', { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
    }
  }, { passive: false });
}

function onMouseMove(e) {
  const r = renderer.domElement.getBoundingClientRect();
  mouseNDC.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  mouseNDC.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  raycaster.setFromCamera(mouseNDC, camera);

  if (isDraggingAtom && selectedAtom) {
    const pt = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(dragPlane, pt)) {
      selectedAtom.group.position.copy(pt.add(dragOffset));
      selectedAtom.group.position.y = Math.max(selectedAtom.group.position.y, GROUND_Y + ATOM_RADIUS);
      checkAndFormConnections(selectedAtom);
    }
    return;
  }
  hoveredAtom = findAtomUnderRay();
}

let mouseDownPos = { x: 0, y: 0 };
const CLICK_THRESHOLD = 5; // pixels — distinguish click from drag

function onMouseDown(e) {
  if (e.button !== 0 || isDraggingFromPalette || isDraggingMachine) return;
  mouseDownPos.x = e.clientX; mouseDownPos.y = e.clientY;
  hideSkinPicker();
  if (currentTool === 'select') {
    const atom = findAtomUnderRay();
    if (atom) {
      selectedAtom = atom; isDraggingAtom = true; controls.enabled = false;
      const camDir = camera.getWorldDirection(new THREE.Vector3());
      dragPlane.setFromNormalAndCoplanarPoint(camDir.negate(), atom.group.position);
      const pt = new THREE.Vector3();
      raycaster.ray.intersectPlane(dragPlane, pt);
      dragOffset.copy(atom.group.position).sub(pt);
    }
  } else if (selectedAtomType) {
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const pt = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(plane, pt)) {
      pt.y = Math.max(pt.y, GROUND_Y + ATOM_RADIUS);
      addAtom(selectedAtomType, pt);
    }
  }
}

function onMouseUp(e) {
  if (isDraggingAtom && selectedAtom) {
    checkAndFormConnections(selectedAtom);
    // If it was a click (not a drag), show skin picker for this molecule
    const dx = e.clientX - mouseDownPos.x, dy = e.clientY - mouseDownPos.y;
    if (Math.sqrt(dx * dx + dy * dy) < CLICK_THRESHOLD) {
      const skin = findSkinForAtom(selectedAtom.id);
      if (skin) showSkinPicker(skin, e.clientX, e.clientY);
    }
    isDraggingAtom = false; controls.enabled = true;
  }
}

function onRightClick(e) {
  e.preventDefault();
  raycaster.setFromCamera(mouseNDC, camera);
  const atom = findAtomUnderRay();
  if (atom) { removeAtom(atom.id); showToast('Removed ' + ATOM_DEFS[atom.type].name); }
}

function onDoubleClick() {
  raycaster.setFromCamera(mouseNDC, camera);
  const atom = findAtomUnderRay();
  if (!atom) return;
  if (atom.type === 'hold') {
    atom.group.userData.isOn = !atom.group.userData.isOn;
    showToast('HOLD: ' + (atom.group.userData.isOn ? 'ON' : 'OFF'));
  }
  if (atom.type === 'relay') {
    const modes = ['pass', 'block', 'invert'];
    const cur = atom.group.userData.relayMode || 'pass';
    const next = modes[(modes.indexOf(cur) + 1) % modes.length];
    atom.group.userData.relayMode = next;
    showToast('RELAY: ' + next.toUpperCase());
  }
}

function onKeyDown(e) {
  if (e.code === 'Space') { e.preventDefault(); isFrozen = !isFrozen; updateFreezeUI(); showToast(isFrozen ? 'Time frozen' : 'Time running'); }
  if (e.key === 'v' || e.key === 'V') toggleSelectTool();
  if (e.key === 'Escape') { currentTool = null; selectedAtomType = null; selectedAtom = null; clearGhost(); updatePaletteUI(); }
  const qk = { '1': 'pulse', '2': 'sense', '3': 'relay', '4': 'hold', '5': 'flex' };
  if (qk[e.key]) selectAtomType(qk[e.key]);
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (hoveredAtom) { removeAtom(hoveredAtom.id); showToast('Removed ' + ATOM_DEFS[hoveredAtom.type].name); hoveredAtom = null; }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.key === 'd' || e.key === 'D') {
    // Toggle wireframe on skin meshes for debugging
    for (const entry of moleculeSkins.values()) {
      if (entry.material) entry.material.wireframe = !entry.material.wireframe;
    }
    showToast('Skin wireframe toggled');
  }
}

function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

function findAtomUnderRay() {
  let best = null, bD = RAYCAST_THRESHOLD;
  for (const a of atoms) {
    const d = raycaster.ray.distanceToPoint(a.group.position);
    if (d < bD) { bD = d; best = a; }
  }
  return best;
}

function undo() {
  if (!undoHistory.length) return;
  const last = undoHistory.pop();
  if (last.action === 'add') {
    const a = atomMap.get(last.atomId);
    if (a) {
      for (const c of connections.filter(c => c.fromAtomId === a.id || c.toAtomId === a.id)) removeConnection(c);
      scene.remove(a.group); atoms.splice(atoms.indexOf(a), 1); atomMap.delete(a.id); updateAtomCount();
    }
  }
}

// ===========================================================================
// RENDER LOOP
// ===========================================================================

let lastTime = performance.now();

function animate() {
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  const time = now / 1000;

  controls.update();
  updatePhysics(dt);
  updateSignalSystem(dt, time);
  updateSignalVisuals();
  updateConnectionBridges();
  updateTendrils();
  updateAtomAnimations(time);

  if (currentTool === 'select')
    renderer.domElement.style.cursor = isDraggingAtom ? 'grabbing' : (hoveredAtom ? 'grab' : 'crosshair');
  else if (selectedAtomType) renderer.domElement.style.cursor = 'copy';
  else renderer.domElement.style.cursor = 'default';

  // Update skin sphere positions to follow atoms
  if (skinOpacity > 0) updateMoleculeSkins();

  // Synchronous render — queues GPU commands without blocking.
  // setAnimationLoop handles frame pacing; renderAsync is NOT needed here.
  renderer.setRenderTarget(null);
  renderer.render(scene, camera);
}

// ===========================================================================
// BOOT
// ===========================================================================

// Expose internals for test automation
window.__test = {
  get atoms() { return atoms; },
  get moleculeSkins() { return moleculeSkins; },
  get skinTextureCache() { return skinTextureCache; },
  loadSkinFromJSON, createSkinMaterial, getSkinColor, findSkinForAtom,
  addAtom, removeAtom, updateMoleculeSkins, THREE,
  get mcGPU() { return mcGPU; },
  SKIN_REGISTRY, AVAILABLE_SKINS,
  get defaultSkinType() { return defaultSkinType; },
  set defaultSkinType(v) { defaultSkinType = v; },
  ensureDisplacementPixels, applyDisplacementMultiplier,
  get currentDisplacementMultiplier() { return currentDisplacementMultiplier; },
  spawnMachine, PREBUILT_MACHINES,
  get connections() { return connections; },
  get isFrozen() { return isFrozen; },
  set isFrozen(v) { isFrozen = v; },
};

init().catch(err => {
  console.error('Init failed:', err);
  document.body.innerHTML = `<div style="color:#e8603c;padding:40px;font-size:16px;font-family:system-ui">
    WebGPU initialization failed. Use Chrome 113+ or Edge 113+.<br>
    <span style="color:#666;font-size:13px">${err.message}</span>
  </div>`;
});

</script>
